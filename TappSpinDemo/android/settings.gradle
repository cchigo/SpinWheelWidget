pluginManagement {
    includeBuild("../node_modules/@react-native/gradle-plugin")
}
plugins { 
    id("com.facebook.react.settings") 
}

extensions.configure(com.facebook.react.ReactSettingsExtension){ ex ->
    ex.autolinkLibrariesFromCommand()
}

// Project name
rootProject.name = 'TappSpinDemo'

// Include app
include ':app'

// Include React Native Gradle plugin
includeBuild('../node_modules/@react-native/gradle-plugin')

// ✅ Include your SpinWheel module
include ':react-native-spin-wheel-widget'
project(':react-native-spin-wheel-widget').projectDir = new File(rootProject.projectDir, '../node_modules/react-native-spin-wheel-widget/android')